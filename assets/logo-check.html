<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{margin:0;background:#eef1f3;font-family:Arial;padding:20px}
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px}
.chip{background:#fff;border:1px solid #ddd;border-radius:12px;height:96px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.chip img{height:42px;max-width:120px;object-fit:contain}
.chip span{font-size:10px;color:#555;font-family:monospace}
</style></head><body><div class="grid" id="g"></div>
<script>
const names=['openai','anthropic','gemini','langchain','react','nextjs','flutter','fastapi','django','nodejs','spring','python','typescript','java','aws','mongodb','postgresql','redis','firebase','stripe','n8n','make','zapier','tableau','looker','mixpanel','twilio','hubspot','salesforce','clay','apollo','rb2b','commonroom','factors','linkedin','workato','fullenrich'];
const g=document.getElementById('g');
for(const n of names){const d=document.createElement('div');d.className='chip';d.innerHTML=`<img src="logos/${n}.png" onerror="this.style.opacity=.15"><span>${n}</span>`;g.appendChild(d);}
</script></body></html>
