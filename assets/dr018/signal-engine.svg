<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Signal to revenue engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#0a5f5f"/>
      <stop offset="0.42" stop-color="#064242"/>
      <stop offset="1" stop-color="#021f22"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6AE3E1" stop-opacity="0.55"/>
      <stop offset="0.35" stop-color="#0DCFCF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#0DCFCF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="topGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#0DCFCF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0DCFCF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6AE3E1" stop-opacity="0.15"/>
      <stop offset="0.6" stop-color="#0DCFCF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#6AE3E1" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0aa3a3" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6AE3E1" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="scrim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#021f22" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#021d20" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#01161a" stop-opacity="0.9"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#6AE3E1" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="320" height="900" fill="url(#bg)"/>
  <rect width="320" height="900" fill="url(#dots)"/>
  <ellipse cx="168" cy="150" rx="170" ry="150" fill="url(#topGlow)"/>

  <!-- faint circuit traces -->
  <g fill="none" stroke="#6AE3E1" stroke-opacity="0.12" stroke-width="1">
    <path d="M14 330 H70 V300 H120"/>
    <path d="M306 250 H250 V210"/>
    <path d="M300 470 H262 V500 H236"/>
    <path d="M20 560 H60 V600"/>
  </g>
  <g fill="#6AE3E1" fill-opacity="0.28">
    <rect x="117" y="297" width="6" height="6" rx="1"/>
    <rect x="247" y="207" width="6" height="6" rx="1"/>
    <rect x="57" y="597" width="6" height="6" rx="1"/>
  </g>

  <!-- converging signal streams (behind nodes) -->
  <g fill="none" stroke="url(#stream)" stroke-width="1.6" stroke-linecap="round">
    <path d="M78 168 C 96 300, 150 360, 160 452" opacity="0.9"/>
    <path d="M236 132 C 232 300, 176 360, 162 452" opacity="0.9"/>
    <path d="M168 246 C 168 320, 162 390, 160 452" opacity="0.75"/>
  </g>
  <!-- travelling beads on the streams -->
  <g fill="#bff6f4">
    <circle cx="120" cy="300" r="1.7" opacity="0.85"/>
    <circle cx="138" cy="372" r="1.5" opacity="0.7"/>
    <circle cx="220" cy="300" r="1.7" opacity="0.85"/>
    <circle cx="185" cy="372" r="1.5" opacity="0.7"/>
    <circle cx="164" cy="360" r="1.5" opacity="0.6"/>
  </g>

  <!-- signal nodes (top): radar pings -->
  <g>
    <!-- S1 -->
    <circle cx="78" cy="168" r="22" fill="none" stroke="#6AE3E1" stroke-opacity="0.18" stroke-width="0.9"/>
    <circle cx="78" cy="168" r="15" fill="none" stroke="#6AE3E1" stroke-opacity="0.38" stroke-width="0.9"/>
    <circle cx="78" cy="168" r="12" fill="#0DCFCF" fill-opacity="0.10"/>
    <circle cx="78" cy="168" r="4.2" fill="#6AE3E1"/>
    <circle cx="78" cy="168" r="2" fill="#eafffe"/>
    <!-- S2 -->
    <circle cx="236" cy="132" r="24" fill="none" stroke="#6AE3E1" stroke-opacity="0.16" stroke-width="0.9"/>
    <circle cx="236" cy="132" r="16" fill="none" stroke="#6AE3E1" stroke-opacity="0.36" stroke-width="0.9"/>
    <circle cx="236" cy="132" r="12" fill="#0DCFCF" fill-opacity="0.10"/>
    <circle cx="236" cy="132" r="4.6" fill="#6AE3E1"/>
    <circle cx="236" cy="132" r="2.1" fill="#eafffe"/>
    <!-- S3 -->
    <circle cx="168" cy="246" r="19" fill="none" stroke="#6AE3E1" stroke-opacity="0.16" stroke-width="0.9"/>
    <circle cx="168" cy="246" r="13" fill="none" stroke="#6AE3E1" stroke-opacity="0.34" stroke-width="0.9"/>
    <circle cx="168" cy="246" r="3.8" fill="#6AE3E1"/>
    <circle cx="168" cy="246" r="1.8" fill="#eafffe"/>
  </g>

  <!-- ENGINE core (center) -->
  <g>
    <circle cx="160" cy="500" r="78" fill="url(#coreGlow)"/>
    <circle cx="160" cy="500" r="46" fill="none" stroke="#0DCFCF" stroke-opacity="0.30" stroke-width="1"/>
    <circle cx="160" cy="500" r="40" fill="none" stroke="#6AE3E1" stroke-opacity="0.55" stroke-width="1" stroke-dasharray="1 6"/>
    <circle cx="160" cy="500" r="30" fill="none" stroke="#6AE3E1" stroke-opacity="0.5" stroke-width="1.2"/>
    <!-- hex chamber -->
    <path d="M160 478 L179 489 L179 511 L160 522 L141 511 L141 489 Z"
          fill="#0DCFCF" fill-opacity="0.10" stroke="#6AE3E1" stroke-opacity="0.85" stroke-width="1.3" stroke-linejoin="round"/>
    <!-- nucleus -->
    <circle cx="160" cy="500" r="9" fill="#0DCFCF" fill-opacity="0.35"/>
    <circle cx="160" cy="500" r="5" fill="#eafffe"/>
    <!-- orbiting nodes -->
    <circle cx="200" cy="500" r="2.6" fill="#6AE3E1"/>
    <circle cx="132" cy="479" r="2.2" fill="#6AE3E1" fill-opacity="0.8"/>
    <circle cx="160" cy="460" r="2" fill="#bff6f4" fill-opacity="0.8"/>
  </g>

  <!-- OUTPUT: engine -> rising revenue -->
  <g fill="none" stroke="url(#stream)" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <path d="M160 540 C 150 590, 96 600, 84 636"/>
    <path d="M160 540 C 160 590, 160 600, 160 626"/>
    <path d="M160 540 C 172 590, 224 600, 236 620"/>
  </g>

  <!-- ascending bars (revenue), baseline y=690 -->
  <g>
    <line x1="52" y1="690.5" x2="268" y2="690.5" stroke="#6AE3E1" stroke-opacity="0.28" stroke-width="1"/>
    <g>
      <rect x="64"  y="654" width="18" height="36"  rx="3" fill="url(#bar)" fill-opacity="0.55"/>
      <rect x="92"  y="640" width="18" height="50"  rx="3" fill="url(#bar)" fill-opacity="0.62"/>
      <rect x="120" y="648" width="18" height="42"  rx="3" fill="url(#bar)" fill-opacity="0.6"/>
      <rect x="148" y="624" width="18" height="66"  rx="3" fill="url(#bar)" fill-opacity="0.72"/>
      <rect x="176" y="606" width="18" height="84"  rx="3" fill="url(#bar)" fill-opacity="0.82"/>
      <rect x="204" y="586" width="18" height="104" rx="3" fill="url(#bar)" fill-opacity="0.9"/>
      <rect x="232" y="562" width="18" height="128" rx="3" fill="url(#bar)"/>
    </g>
    <!-- rising trend line + endpoint -->
    <polyline points="73,650 101,636 129,644 157,620 185,602 213,582 241,558"
              fill="none" stroke="#eafffe" stroke-opacity="0.85" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="241" cy="558" r="3.4" fill="#eafffe"/>
    <circle cx="241" cy="558" r="6.5" fill="none" stroke="#6AE3E1" stroke-opacity="0.6" stroke-width="1"/>
    <path d="M250 566 l10 -10 m0 0 h-6.5 m6.5 0 v6.5" fill="none" stroke="#6AE3E1" stroke-opacity="0.8" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- caption scrim (bottom) -->
  <rect x="0" y="560" width="320" height="340" fill="url(#scrim)"/>
</svg>
