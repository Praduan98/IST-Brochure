<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#222;font-family:Arial;margin:0;padding:18px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.c{position:relative;border-radius:10px;overflow:hidden;aspect-ratio:3/2;background:#111}
.c img{width:100%;height:100%;object-fit:cover;display:block}
.c span{position:absolute;left:0;bottom:0;right:0;background:rgba(0,0,0,.7);color:#6AE3E1;font-family:monospace;font-size:13px;padding:4px 8px}
</style></head><body><div class="grid" id="g"></div><script>
const f=["darkfunnel1","darkfunnel2","darkfunnel3","signals1","signals2","signals3","data1","data2","data3","team1","team2","hiring1","hiring2","engine1","ai1","growth1"];
for(const n of f){const d=document.createElement('div');d.className='c';d.innerHTML=`<img src="assets/dr018/cand/${n}.jpg"><span>${n}</span>`;g.appendChild(d);}
</script></body></html>
