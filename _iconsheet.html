<!DOCTYPE html><html><head><meta charset="utf-8"><style>
body{background:#fff;font-family:Inter,Arial,sans-serif;margin:0;padding:24px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:14px}
.c{display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid #e3e3e3;border-radius:12px;padding:14px 6px;background:#fff}
.c img{width:46px;height:46px;object-fit:contain}
.c .n{font-size:10px;color:#333;font-family:'Space Mono',monospace}
.dark{background:#066d6d;border-radius:12px;padding:18px;margin-top:18px}
.dark .c{background:rgba(255,255,255,.94)}
h3{font-family:Arial;font-size:13px;color:#066d6d;margin:18px 0 8px}
</style></head><body>
<h3>ALL STACK ICONS — on white</h3>
<div class="grid" id="g"></div>
<h3>ON WHITE CARD (as they'll appear in chips)</h3>
<div class="dark"><div class="grid" id="g2"></div></div>
<script>
const ic=["rb2b.svg","factors.png","commonroom.png","g2.ico","clay.png","apollo.svg","fullenrich.png","oceanio.png","clearbit.png","builtwith.png","hubspot.svg","salesforce.svg","n8n.svg","make.png","zapier.svg","slack.svg","workato.png","smartlead.png","instantly.png","heyreach.png","linkedin.svg","googleads.png","meta.ico","openai.svg","anthropic.svg","gemini.svg","relevanceai.png"];
for(const f of ic){const d=document.createElement('div');d.className='c';d.innerHTML=`<img src="assets/tech-color/${f}"><span class="n">${f}</span>`;g.appendChild(d);const d2=d.cloneNode(true);g2.appendChild(d2);}
</script>
</body></html>
